name: Sync to Hugging Face Space

on:
  push:
    branches:
      - port    # Now listening to your active branch!

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://vince-ing:$HF_TOKEN@huggingface.co/spaces/vince-ing/pdf-editor-backend HEAD:main