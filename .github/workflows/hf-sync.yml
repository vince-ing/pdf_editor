name: Sync to Hugging Face Space

on:
  push:
    branches:
      - port

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Snapshot and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a clean temporary directory
          mkdir deploy_snapshot
          
          # 2. Copy ONLY the files Hugging Face needs
          cp -r engine/ deploy_snapshot/
          cp requirements.txt deploy_snapshot/
          cp Dockerfile deploy_snapshot/
          
          # 3. Enter the clean directory and start a fresh Git repository
          cd deploy_snapshot
          git init
          git checkout -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 4. Generate the Hugging Face configuration README
          cat <<EOF > README.md
          ---
          title: Pdf Editor Backend
          emoji: 🐳
          colorFrom: blue
          colorTo: green
          sdk: docker
          app_file: Dockerfile
          pinned: false
          ---
          EOF
          
          # 5. Commit this clean snapshot
          git add .
          git commit -m "Clean snapshot deployment from GitHub Actions"
          
          # 6. Force push the clean snapshot to Hugging Face
          git push --force https://vince-ing:$HF_TOKEN@huggingface.co/spaces/vince-ing/pdf-editor-backend main:main